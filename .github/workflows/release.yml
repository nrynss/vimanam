name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Vimanam ${{ github.ref_name }}" \
            --notes "$(cat <<'EOF'
          # Vimanam ${{ github.ref_name }}

          OpenAPI/Swagger JSON to Markdown documentation generator.

          ## Features:
          - Convert OpenAPI JSON files to Markdown documentation
          - Group endpoints by service or HTTP method
          - Filter by service, path, or method
          - Multiple detail levels (summary, basic, standard, full)
          - Sorting options for endpoints

          ## Downloads:
          Binaries for Linux, macOS (Intel & Apple Silicon), and Windows are attached to this release.
          EOF
          )"

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master 2026-03-27
        with:
          toolchain: stable

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  build-and-upload:
    name: Build and Upload
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux (x86_64)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: vimanam
            asset_name: vimanam-linux-x86_64

          # Windows (x86_64)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: vimanam.exe
            asset_name: vimanam-windows-x86_64.exe

          # macOS (Intel x86_64)
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: vimanam
            asset_name: vimanam-macos-x86_64

          # macOS (ARM64 / Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: vimanam
            asset_name: vimanam-macos-arm64

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master 2026-03-27
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload Release Asset
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "${{ matrix.asset_name }}"
          gh release upload "${{ github.ref_name }}" "${{ matrix.asset_name }}" --clobber
